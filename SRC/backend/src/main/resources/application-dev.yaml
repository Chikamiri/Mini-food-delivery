spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mini_food_db?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:2142005}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongAndVerySecretJWTkeyForConChoCaoBangBoPeCe}
    expiration-ms: 86400000
