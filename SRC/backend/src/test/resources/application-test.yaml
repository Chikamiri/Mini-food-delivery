spring:
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongAndVerySecretJWTkeyForConChoCaoBangBoPeCe}
    expiration-ms: 86400000
  delivery:
    default-fee: 15.00
